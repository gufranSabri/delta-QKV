# Base config. Every dataset x LLM config layers on top of this and overrides
# only what differs. Values here are the defaults from the design discussion.

llm:
  name: meta-llama/Meta-Llama-3-8B-Instruct
  dtype: bfloat16
  alias: llama3_8b            # used in output paths (no '/' in directory names)

dataset:
  name: triviaqa
  n_samples: 10000
  max_new_tokens: 100
  prompt_template: "Answer the question concisely. Q: {question} A:"

extract:
  # WHAT to capture and HOW to channel it. Both are extraction-time choices that
  # change what lands on disk, so they partition the data folder:
  #   data/{source}/{extraction_type}/{dataset}/{llm_alias}/
  source: qkv                 # qkv (Q/K/V projections) | hs (hidden states)
  extraction_type: transforms      # delta (raw,dprev,dnext) | transforms (raw,DWT,FFT)
  views: [Q,K,V]                  # subset for ablations, e.g. [H]. Fusion adapts.
                              # source=hs is a single stream -> views defaults to [H].
  pool: mean                   # max | mean | l2 | sdk  -- how D is reduced to n_cols
                              # max: peak value per chunk
                              # mean: average value per chunk
                              # l2: L2 norm per chunk
                              # sdk: selective dimension keeper (picks top-entropy dims)
  boundary_mode: wrap         # zero | replicate | wrap (delta only; see tensor_ops.py)
  dtype: float16
  max_tokens: 100
  n_cols: null                # null -> use the model's layer count => SQUARE image
  l_eff: null                 # null -> keep the model's L. Set for cross-LLM runs.

labeling:
  scheme: exact_match         # exact_match | bleurt
  bleurt_threshold: 0.5
  bleurt_checkpoint: models/BLEURT-20-D12

model:
  backbone: scratch_cnn       # scratch_cnn | resnet18
  # How the extracted (V views x 3 channels) tensor is regrouped into images.
  # Pure re-slicing -- no mode needs re-extraction. (ch0,ch1,ch2) are the three
  # extraction channels: (raw,dprev,dnext) for delta, (raw,DWT,FFT) for transforms.
  #   default     V images, 3ch each: view v -> (ch0, ch1, ch2)
  #   first_only  1 image,  Vch: the raw channel of each view -- others dropped
  #   same        3 images, Vch each, grouped BY CHANNEL:
  #               (ch0 of all views), (ch1 of all views), (ch2 of all views)
  channels: same                # default | first_only | same
  include: [0]                 # null (keep all) or a list of image indices to keep
  # Stream 2: transposes each (T, L, D) image to (D, L, T) before the same
  # `channels` regrouping stream 1 uses -- generated TOKENS become a spatial
  # axis instead of the sequence axis, so the CNN can find "this happens over
  # these tokens" structure directly. Off by default (single-stream, as
  # today). Only backbone=scratch_cnn supports it.
  stream2:
    enable: true
    include: [0]                # same semantics as model.include, own axis
  share_backbone: false       # false => one CNN per view (Q, K, V untied)
  embed_dim: 256              # E: per-view CNN output
  fusion: concat_mlp               # gated | concat_mlp | bilinear | cross_attn
  fused_dim: 256              # F: fusion output
  conv1d_layers: 2
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.3
  pretrained_backbone: true   # only used by resnet18

train:
  batch_size: 8
  lr: 0.0001
  weight_decay: 0.0001
  # Pretrained resnet18 backbone trains at lr * this. A gentler LR keeps the
  # random head from wrecking the ImageNet features early. Set to 1.0 for
  # scratch_cnn / pretrained_backbone:false (nothing pretrained to protect).
  backbone_lr_scale: 0.1
  # Linear LR decay: flat for the first lr_decay_start epochs, then ramp linearly
  # down to lr_final_scale x the initial LR by `epochs` (0.0 => decays to zero).
  lr_decay_start: 5
  lr_final_scale: 0.0
  epochs: 30
  patience: 8
  seed: 42                    # ACT-ViT's RANDOM_STATE; HalluShift uses 42 too
  num_workers: 4
  val_fraction: 0.2
  # Only applies to datasets with no separate held-out corpus (TruthfulQA).
  # The rest evaluate on a `<name>_test` corpus, so nothing is carved out.
  test_fraction: 0.2
  balance_classes: true

data_root: data
runs_root: runs
