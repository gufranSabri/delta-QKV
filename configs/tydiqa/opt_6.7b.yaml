# tydiqa x facebook/opt-6.7b   [HalluShift comparison]
# geometry: L=32  D=4096  (no GQA) -> 32x32 per view
llm:
  name: facebook/opt-6.7b
  alias: opt_6.7b

dataset:
  name: tydiqa
  n_samples: 10000
  max_new_tokens: 64          # HalluShift: greedy, 64 new tokens
  prompt_template: "Answer the question concisely based on the context: \n {context} \n Q: {question} A:"

labeling:
  scheme: bleurt              # HalluShift labels with BLEURT-20-D12
  bleurt_threshold: 0.5       # hallucination = 1 if max BLEURT <= 0.5
  bleurt_checkpoint: models/BLEURT-20-D12
