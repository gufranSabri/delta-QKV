# imdb x Qwen/Qwen2.5-7B-Instruct
# geometry: L=28  D_q=3584  D_kv=512  ->  image 28x32 per view (see extract.n_cols)
llm:
  name: Qwen/Qwen2.5-7B-Instruct
  alias: qwen2.5_7b

dataset:
  name: imdb
  n_samples: 10000
  max_new_tokens: 16
  prompt_template: "Is the sentiment of this review positive or negative?\nReview: {review}\nLabel:"

extract:
  # Qwen2.5-7B has L=28 layers but D_kv=512, and 28 does not divide 512, so the
  # default n_cols=L cannot pool the K/V views. 32 divides both D_q=3584 and
  # D_kv=512, so we fix n_cols=32 -> images are 28x32 (very slightly non-square).
  n_cols: 32
